<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>DocSafe 🛡️ Menorca Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; overflow-x: hidden; }
        .card-doc { background: #1e293b; border-radius: 1.2rem; border: 1px solid #334155; }
        .expiry-warning { border-left: 5px solid #ef4444; background: #450a0a; }
        .nomina-style { border-left: 5px solid #22c55e; }
        input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
        .loading-overlay { background: rgba(15, 23, 42, 0.95); backdrop-blur: 10px; }
    </style>
</head>
<body x-data="docApp()" x-init="init()" class="pb-20">

    <div x-show="loading" class="fixed inset-0 z-[100] loading-overlay flex flex-col items-center justify-center p-6 text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mb-4"></div>
        <p class="text-sm font-bold text-blue-400 uppercase tracking-widest mb-2" x-text="statusMsg"></p>
        <p class="text-[10px] text-slate-500 mb-6">Si el archivo es grande o hay poca cobertura, espera un poco...</p>
        <button @click="loading = false" class="px-4 py-2 bg-red-500/20 text-red-400 text-[10px] font-bold rounded-lg uppercase">Cancelar</button>
    </div>

    <header class="p-6 flex justify-between items-center bg-slate-900/80 backdrop-blur-md sticky top-0 z-10 border-b border-white/5">
        <div>
            <h1 class="text-2xl font-black tracking-tighter">DocSafe <span class="text-blue-500">🛡️</span></h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Nube Privada Menorca</p>
        </div>
        <button @click="showEditor = !showEditor" class="bg-blue-600 p-3 rounded-2xl shadow-xl">
            <span class="material-symbols-outlined text-white" x-text="showEditor ? 'close' : 'add_circle'"></span>
        </button>
    </header>

    <main class="p-4 space-y-6">
        <section x-show="showEditor" x-transition x-cloak class="card-doc p-5 space-y-4 shadow-2xl">
            <h2 class="text-sm font-black text-blue-400 uppercase">Añadir Documento</h2>
            <div class="space-y-3">
                <input type="text" x-model="nuevo.nombre" placeholder="Nombre del archivo..." class="w-full p-3 rounded-xl text-sm outline-none">
                <select x-model="nuevo.categoria" class="w-full p-3 rounded-xl text-sm outline-none">
                    <template x-for="cat in categorias.filter(c => c !== 'TODOS')">
                        <option :value="cat" x-text="cat"></option>
                    </template>
                </select>
                <input type="date" x-model="nuevo.fecha" class="w-full p-3 rounded-xl text-sm outline-none">
                
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button @click="capturar()" class="py-4 bg-blue-600 rounded-2xl font-black text-white uppercase text-[10px] flex flex-col items-center justify-center gap-1">
                        <span class="material-symbols-outlined">camera_alt</span> Cámara
                    </button>
                    <label class="py-4 bg-slate-700 rounded-2xl font-black text-white uppercase text-[10px] flex flex-col items-center justify-center gap-1 cursor-pointer border border-white/10">
                        <span class="material-symbols-outlined">description</span> Buscar en Files
                        <input type="file" class="hidden" accept="image/*,application/pdf" @change="subirDesdeArchivos($event)">
                    </label>
                </div>
            </div>
        </section>

        <div class="flex gap-2 overflow-x-auto no-scrollbar py-2">
            <template x-for="cat in categorias">
                <button @click="filtro = cat" 
                        :class="filtro === cat ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400'"
                        class="px-5 py-2 rounded-full text-[11px] font-black uppercase transition-all" x-text="cat"></button>
            </template>
        </div>

        <div class="grid gap-3">
            <template x-for="doc in docsFiltrados" :key="doc.id">
                <div class="card-doc p-4 flex items-center justify-between" :class="{'expiry-warning': esCaducado(doc.fecha), 'nomina-style': doc.categoria === 'NÓMINAS'}">
                    <div class="flex items-center gap-4 flex-grow cursor-pointer" @click="verDoc(doc)">
                        <div class="p-3 bg-slate-800 rounded-2xl text-blue-400">
                            <span class="material-symbols-outlined" x-text="getIcon(doc.categoria, doc.esPDF)"></span>
                        </div>
                        <div>
                            <h3 class="font-bold text-white text-sm" x-text="doc.nombre"></h3>
                            <p class="text-[10px] text-slate-500" x-text="doc.fecha ? formatDate(doc.fecha) : 'Sin fecha'"></p>
                        </div>
                    </div>
                    <button @click="borrar(doc)" class="text-slate-600 p-2"><span class="material-symbols-outlined">delete</span></button>
                </div>
            </template>
        </div>
    </main>

    <script>
        // ¡IMPORTANTE! ASEGÚRATE DE QUE ESTOS DATOS SON LOS DE TU CONSOLA
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        function docApp() {
            return {
                showEditor: false, loading: false, statusMsg: 'Conectando...',
                filtro: 'TODOS', categorias: ['TODOS', 'PERSONALES', 'BUS', 'NÓMINAS', 'SALUD', 'OTROS'],
                docs: [], nuevo: { nombre: '', categoria: 'PERSONALES', fecha: '' },
                
                init() {
                    db.collection("documentos").orderBy("createdAt", "desc").onSnapshot(snap => {
                        this.docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    }, err => alert("Error de conexión: " + err.message));
                },

                async subirDesdeArchivos(event) {
                    const file = event.target.files[0];
                    if(!file || !this.nuevo.nombre) return alert("Ponle nombre primero");
                    
                    this.loading = true;
                    this.statusMsg = "Subiendo archivo...";
                    
                    const esPDF = file.type === 'application/pdf';
                    await this.enviarANube(file, esPDF);
                },

                async enviarANube(file, esPDF) {
                    const nombreFinal = `${Date.now()}_${this.nuevo.nombre}`;
                    const ref = storage.ref(`documentos/${nombreFinal}`);
                    
                    try {
                        // Subida con monitoreo
                        const uploadTask = ref.put(file);
                        
                        uploadTask.on('state_changed', 
                            (snapshot) => {
                                let progreso = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                                this.statusMsg = `Subiendo: ${Math.round(progreso)}%`;
                            }, 
                            (error) => { throw error; }
                        );

                        await uploadTask;
                        const url = await ref.getDownloadURL();
                        
                        await db.collection("documentos").add({
                            ...this.nuevo, foto: url, esPDF: esPDF,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });

                        this.nuevo = { nombre: '', categoria: 'PERSONALES', fecha: '' };
                        this.showEditor = false;
                        alert("✅ ¡Subido con éxito!");
                    } catch (e) {
                        console.error(e);
                        alert("❌ ERROR: " + e.message + ". Revisa las reglas de seguridad de Firebase.");
                    } finally {
                        this.loading = false;
                    }
                },

                // (Resto de funciones: borrar, verDoc, formatDate, etc. igual que antes)
                async borrar(doc) {
                    if(confirm("¿Eliminar?")) {
                        try {
                            await db.collection("documentos").doc(doc.id).delete();
                        } catch(e) { alert("Error al borrar"); }
                    }
                },
                verDoc(doc) {
                    if(doc.esPDF) window.open(doc.foto, '_blank');
                    else { this.selectedDoc = doc; this.viewImage = true; }
                },
                formatDate(f) { return f ? f.split('-').reverse().join('/') : ''; },
                get docsFiltrados() {
                    return this.filtro === 'TODOS' ? this.docs : this.docs.filter(d => d.categoria === this.filtro);
                },
                esCaducado(f) {
                    if(!f || this.filtro === 'NÓMINAS') return false;
                    return new Date(f) < new Date();
                },
                getIcon(cat, pdf) {
                    if(pdf) return 'picture_as_pdf';
                    return cat === 'BUS' ? 'directions_bus' : 'description';
                }
            }
        }
    </script>
</body>
</html>
