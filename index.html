<div class="grid grid-cols-2 gap-3">
    <button @click="capturar()" class="py-4 bg-blue-600 rounded-2xl font-black text-white uppercase text-[10px] flex flex-col items-center justify-center gap-1">
        <span class="material-symbols-outlined">camera_alt</span> Cámara
    </button>
    
    <label class="py-4 bg-slate-700 rounded-2xl font-black text-white uppercase text-[10px] flex flex-col items-center justify-center gap-1 cursor-pointer">
        <span class="material-symbols-outlined">upload_file</span> Subir PDF/Foto
        <input type="file" class="hidden" @change="subirArchivo($event)">
    </label>
</div>

<script>
    // ... dentro de docApp() ...
    async subirArchivo(event) {
        if(!this.nuevo.nombre) return alert("⚠️ Ponle un nombre primero");
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            // Si es un PDF, guardamos una miniatura o el enlace
            // Si es imagen, la guardamos directa
            this.docs.push({ 
                ...this.nuevo, 
                foto: e.target.result,
                esPDF: file.type === 'application/pdf'
            });
            this.guardarTodo();
            this.nuevo = { nombre: '', categoria: 'PERSONALES', fecha: '' };
            this.showEditor = false;
            alert("✅ Archivo guardado");
        };
        reader.readAsDataURL(file);
    },
    
    // Modifica la función verDoc para que abra PDFs bien
    verDoc(doc) {
        if(doc.esPDF) {
            const blob = this.base64ToBlob(doc.foto);
            const url = URL.createObjectURL(blob);
            window.open(url);
        } else {
            this.selectedDoc = doc;
            this.viewImage = true;
        }
    },

    base64ToBlob(base64) {
        const parts = base64.split(';base64,');
        const contentType = parts[0].split(':')[1];
        const raw = window.atob(parts[1]);
        const rawLength = raw.length;
        const uInt8Array = new Uint8Array(rawLength);
        for (let i = 0; i < rawLength; ++i) {
            uInt8Array[i] = raw.charCodeAt(i);
        }
        return new Blob([uInt8Array], {type: contentType});
    }
</script>
